<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事予定表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="board-header">
    <div class="header-left">
      <h1 class="header-title">工事予定表</h1>
      <span class="header-subtitle">Construction Schedule</span>
    </div>
    <div class="header-center">
      <div class="header-today" id="header-today"></div>
    </div>
    <div class="header-right">
      <div class="header-summary" id="header-summary" title="全担当者合計（昼/夜を別件カウント）">
        <div class="hs-item hs-today">
          <span class="hs-label">本日稼働</span>
          <span class="hs-value" id="summary-today">-</span>
          <span class="hs-unit">件</span>
        </div>
        <div class="hs-item hs-tomorrow">
          <span class="hs-label">明日稼働</span>
          <span class="hs-value" id="summary-tomorrow">-</span>
          <span class="hs-unit">件</span>
        </div>
      </div>
      <div id="clock" class="header-clock">00:00:00</div>
    </div>
  </header>

  <div class="board-table-header">
    <div class="col col-client">客先</div>
    <div class="col col-title">工事件名</div>
    <div class="col col-our-person">現場</div>
    <div class="col col-safety">安品</div>
    <div class="col col-partner">協力会社</div>
    <div class="col col-partner-person">担当</div>
    <div class="col col-work">作業内容</div>
    <div class="col col-time">昼/夜</div>
    <div class="col col-priority">重点作業</div>
  </div>

  <div class="board-body" id="board-body"></div>

  <footer class="board-footer">
    <div class="footer-left">
      <span class="footer-live-dot"></span>
      最終更新 <span id="update-time" class="footer-value">--:--:--</span>
    </div>
    <div class="footer-center" id="page-indicator"></div>
    <div class="footer-right">
      全 <span id="total-count" class="footer-value">0</span> 件
    </div>
  </footer>

  <script>
    // ===== 設定 =====
    var MIN_ROW_HEIGHT = 80;
    var PAGE_ROTATE_SEC = 30;
    var GROUP_ROTATE_CYCLES = 1;
    var REFRESH_MS = 5 * 60 * 1000;
    var CACHE_KEY = "construction-board-data";
    var API_URL = "/.netlify/functions/data?signage=true";

    // ===== グローバル変数 =====
    var ROWS_PER_PAGE = 10;
    var currentPage = 0;
    var totalPages = 1;
    var dateGroups = [];
    var currentGroupIdx = 0;
    var groupCycleCount = 0;
    var pageRotateTimer = null;

    var WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];

    // ===== HTMLエスケープ =====
    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    // ===== データ取得 =====
    async function fetchData() {
      try {
        var res = await fetch(API_URL + "&_t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) {}
        return data;
      } catch (e) {
        console.error("Fetch error:", e);
        try {
          var cached = localStorage.getItem(CACHE_KEY);
          if (cached) return JSON.parse(cached);
        } catch (e2) {}
        return { items: [], error: "データを取得できません" };
      }
    }

    // ===== 時計機能 =====
    function startClock() {
      function update() {
        var now = new Date();
        var hh = String(now.getHours()).padStart(2, "0");
        var mm = String(now.getMinutes()).padStart(2, "0");
        var ss = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("clock").textContent = hh + ":" + mm + ":" + ss;
      }
      update();
      setInterval(update, 1000);
    }

    // ===== 日付フォーマット =====
    function formatDateLabel(dateStr) {
      var parts = dateStr.split("-");
      var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      var m = d.getMonth() + 1;
      var day = d.getDate();
      var w = WEEKDAYS[d.getDay()];
      return m + "/" + day + " " + w + "曜日";
    }

    // ===== 今日+明日フィルタリング =====
    function filterTodayTomorrow(items, todayStr, tomorrowStr) {
      if (!items || items.length === 0) return [];
      var filtered = items.filter(function(item) {
        return item.date === todayStr || item.date === tomorrowStr;
      });
      if (filtered.length > 0) return filtered;
      return items;
    }

    // ===== 日付グループ構築 =====
    function buildDateGroups(items, todayStr, tomorrowStr) {
      var todayItems = items.filter(function(item) { return item.date === todayStr; });
      var tomorrowItems = items.filter(function(item) { return item.date === tomorrowStr; });
      var otherItems = items.filter(function(item) {
        return item.date !== todayStr && item.date !== tomorrowStr;
      });
      var groups = [];
      if (todayItems.length > 0) {
        groups.push({ date: todayStr, label: "本日", dateFormatted: formatDateLabel(todayStr), items: todayItems });
      }
      if (tomorrowItems.length > 0) {
        groups.push({ date: tomorrowStr, label: "明日", dateFormatted: formatDateLabel(tomorrowStr), items: tomorrowItems });
      }
      if (otherItems.length > 0 && groups.length === 0) {
        var dates = [];
        otherItems.forEach(function(i) { if (dates.indexOf(i.date) === -1) dates.push(i.date); });
        dates.sort();
        dates.forEach(function(dt) {
          groups.push({ date: dt, label: "", dateFormatted: formatDateLabel(dt), items: otherItems.filter(function(i) { return i.date === dt; }) });
        });
      }
      return groups;
    }

    // ===== 表示件数を画面サイズから自動計算 =====
    function calcRowsPerPage() {
      var available = window.innerHeight - 88 - 62 - 40;
      return Math.max(4, Math.floor(available / MIN_ROW_HEIGHT));
    }

    // ===== 夜間作業判定 =====
    function isNightWork(workTime) {
      return workTime === "夜";
    }

    // ===== 行レンダリング =====
    function renderRow(item, index, rowHeight, rowId) {
      var evenOdd = index % 2 === 0 ? "row-even" : "row-odd";
      var priorityClass = item.is_priority ? " row-priority" : "";
      var nightClass = isNightWork(item.work_time) ? " row-night" : "";
      var priorityText = item.is_priority
        ? (item.priority_detail ? item.priority_detail : "重点")
        : "";
      var priorityBadge = item.is_priority
        ? '<span class="priority-badge priority-yes">' + escapeHtml(priorityText) + '</span>'
        : '<span class="priority-badge priority-no">-</span>';

      return '<div class="board-row ' + evenOdd + priorityClass + nightClass + '" data-id="' + escapeAttr(rowId) + '" style="height:' + rowHeight + 'px;">' +
        '<div class="col col-client">' + escapeHtml(item.client) + '</div>' +
        '<div class="col col-title">' + escapeHtml(item.title) + '</div>' +
        '<div class="col col-our-person"><span class="nowrap">' + escapeHtml(item.our_person) + '</span></div>' +
        '<div class="col col-safety"><span class="nowrap">' + escapeHtml(item.safety_person) + '</span></div>' +
        '<div class="col col-partner">' + escapeHtml(item.partner) + '</div>' +
        '<div class="col col-partner-person"><span class="nowrap">' + escapeHtml(item.partner_person) + '</span></div>' +
        '<div class="col col-work">' + escapeHtml(item.work_content) + '</div>' +
        '<div class="col col-time">' + escapeHtml(item.work_time) + '</div>' +
        '<div class="col col-priority">' + priorityBadge + '</div>' +
      '</div>';
    }

    // ===== ヘッダー日付表示更新 =====
    function updateHeaderForGroup(group) {
      var todayEl = document.getElementById("header-today");
      if (!todayEl) return;
      var labelClass = group.label === "明日" ? "header-today-label label-tomorrow" : "header-today-label";
      var label = group.label || "";
      todayEl.innerHTML = '<span class="' + labelClass + '">' + escapeHtml(label) + '</span>' + escapeHtml(group.dateFormatted);
    }

    // ===== 現在日付からtoday/tomorrowを計算 =====
    function getLiveToday() {
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, "0");
      var d = String(now.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }
    function getLiveTomorrow() {
      var now = new Date();
      now.setDate(now.getDate() + 1);
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, "0");
      var d = String(now.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    // ===== 本日/明日稼働計 更新 =====
    function updateSummary(data, todayStr, tomorrowStr) {
      var items = (data && data.items) || [];
      var todayCount = items.filter(function(i) { return i.date === todayStr; }).length;
      var tomorrowCount = items.filter(function(i) { return i.date === tomorrowStr; }).length;
      var tEl = document.getElementById("summary-today");
      var mEl = document.getElementById("summary-tomorrow");
      if (tEl) tEl.textContent = todayCount;
      if (mEl) mEl.textContent = tomorrowCount;
    }

    // ===== ボード表示 =====
    function renderBoard(data) {
      var body = document.getElementById("board-body");

      var todayStr = getLiveToday();
      var tomorrowStr = getLiveTomorrow();
      updateSummary(data, todayStr, tomorrowStr);

      if (data.error) {
        body.innerHTML =
          '<div class="board-message">' +
            '<div class="board-message-icon">&#9888;</div>' +
            '<div class="board-message-error">' + escapeHtml(data.error) + '</div>' +
          '</div>';
        updateFooter(data, 0);
        stopAllTimers();
        return;
      }

      var filtered = filterTodayTomorrow(data.items, todayStr, tomorrowStr);

      if (filtered.length === 0) {
        body.innerHTML =
          '<div class="board-message">' +
            '<div class="board-message-icon">&#128736;</div>' +
            '<div class="board-message-text">本日の工事予定はありません</div>' +
          '</div>';
        updateFooter(data, 0);
        stopAllTimers();
        return;
      }

      dateGroups = buildDateGroups(filtered, todayStr, tomorrowStr);
      dateGroups.forEach(function(g) {
        g.totalPages = Math.ceil(g.items.length / ROWS_PER_PAGE);
      });

      if (currentGroupIdx >= dateGroups.length) currentGroupIdx = 0;
      var group = dateGroups[currentGroupIdx];
      totalPages = group.totalPages;
      if (currentPage >= totalPages) currentPage = 0;

      renderCurrentGroupPage();
      updateHeaderForGroup(group);
      updateFooter(data, filtered.length);

      stopAllTimers();
      if (totalPages > 1 || dateGroups.length > 1) {
        startPageRotation();
      }
    }

    // ===== 現在グループ・ページ描画 =====
    function renderCurrentGroupPage() {
      if (dateGroups.length === 0) return;
      var group = dateGroups[currentGroupIdx];
      var body = document.getElementById("board-body");
      var start = currentPage * ROWS_PER_PAGE;
      var pageItems = group.items.slice(start, start + ROWS_PER_PAGE);

      var available = window.innerHeight - 88 - 62 - 40;
      var layout = (window.__layoutMode || "top");
      var cap;
      if (layout === "fill") cap = 9999;
      else if (layout === "center") cap = Math.floor(MIN_ROW_HEIGHT * 1.3);
      else cap = MIN_ROW_HEIGHT; // top
      var rowHeight = pageItems.length > 0 ? Math.min(cap, Math.floor(available / pageItems.length)) : MIN_ROW_HEIGHT;
      body.style.display = (layout === "center") ? "flex" : "";
      body.style.flexDirection = (layout === "center") ? "column" : "";
      body.style.justifyContent = (layout === "center") ? "center" : "";

      var html = pageItems.map(function(item, idx) {
        var rowId = item.title + "|" + item.date + "|" + item.partner;
        return renderRow(item, idx, rowHeight, rowId);
      });

      body.innerHTML = html.join("");
      updatePageIndicator();
    }

    // ===== ページローテーション =====
    function startPageRotation() {
      if (pageRotateTimer) return;
      groupCycleCount = 0;
      pageRotateTimer = setInterval(function() {
        var body = document.getElementById("board-body");
        var group = dateGroups[currentGroupIdx];
        body.classList.add("fade-out");
        body.classList.remove("fade-in");

        setTimeout(function() {
          var nextPage = currentPage + 1;
          if (nextPage >= group.totalPages) {
            groupCycleCount++;
            if (dateGroups.length > 1 && groupCycleCount >= GROUP_ROTATE_CYCLES) {
              groupCycleCount = 0;
              currentGroupIdx = (currentGroupIdx + 1) % dateGroups.length;
              currentPage = 0;
              var newGroup = dateGroups[currentGroupIdx];
              totalPages = newGroup.totalPages;
              updateHeaderForGroup(newGroup);
            } else {
              currentPage = 0;
            }
          } else {
            currentPage = nextPage;
          }
          renderCurrentGroupPage();
          body.classList.remove("fade-out");
          body.classList.add("fade-in");
        }, 300);
      }, PAGE_ROTATE_SEC * 1000);
    }

    function stopAllTimers() {
      if (pageRotateTimer) {
        clearInterval(pageRotateTimer);
        pageRotateTimer = null;
      }
    }

    function updatePageIndicator() {
      var indicator = document.getElementById("page-indicator");
      var group = dateGroups[currentGroupIdx];
      if (!group) return;
      if (group.totalPages > 1) {
        indicator.textContent = (currentPage + 1) + " / " + group.totalPages;
      } else {
        indicator.textContent = "";
      }
    }

    // ===== フッター更新 =====
    function updateFooter(data, displayCount) {
      if (data.updated_at) {
        var dt = new Date(data.updated_at);
        var hh = String(dt.getHours()).padStart(2, "0");
        var mm = String(dt.getMinutes()).padStart(2, "0");
        var ss = String(dt.getSeconds()).padStart(2, "0");
        document.getElementById("update-time").textContent = hh + ":" + mm + ":" + ss;
      }
      document.getElementById("total-count").textContent = displayCount;
      updatePageIndicator();
    }

    // ===== スクリーン常時点灯（Wake Lock API） =====
    var wakeLockSentinel = null;
    async function acquireWakeLock() {
      try {
        if (!("wakeLock" in navigator)) {
          console.log("[WakeLock] unsupported");
          return;
        }
        if (wakeLockSentinel && !wakeLockSentinel.released) return;
        wakeLockSentinel = await navigator.wakeLock.request("screen");
        console.log("[WakeLock] acquired");
        wakeLockSentinel.addEventListener("release", function() {
          console.log("[WakeLock] released");
        });
      } catch (e) {
        console.warn("[WakeLock] failed:", e && e.message);
      }
    }
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "visible") acquireWakeLock();
    });

    // ===== フルスクリーン =====
    function requestFullscreen() {
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
      acquireWakeLock();
    }

    function toggleFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        requestFullscreen();
      }
    }

    // ===== リサイズ対応 =====
    function onResize() {
      var newRows = calcRowsPerPage();
      if (newRows !== ROWS_PER_PAGE) {
        ROWS_PER_PAGE = newRows;
        stopAllTimers();
        if (dateGroups.length > 0) {
          dateGroups.forEach(function(g) {
            g.totalPages = Math.ceil(g.items.length / ROWS_PER_PAGE);
          });
          var group = dateGroups[currentGroupIdx];
          totalPages = group.totalPages;
          if (currentPage >= totalPages) currentPage = 0;
          renderCurrentGroupPage();
          if (totalPages > 1 || dateGroups.length > 1) startPageRotation();
        }
      }
    }

    // ===== キーボード操作（テスト用） =====
    function advancePage(delta) {
      if (dateGroups.length === 0) return;
      stopAllTimers();
      var group = dateGroups[currentGroupIdx];
      var total = group.totalPages;
      currentPage = (currentPage + delta + total) % total;
      renderCurrentGroupPage();
      if (totalPages > 1 || dateGroups.length > 1) startPageRotation();
    }

    function advanceGroup() {
      if (dateGroups.length <= 1) return;
      stopAllTimers();
      currentGroupIdx = (currentGroupIdx + 1) % dateGroups.length;
      currentPage = 0;
      groupCycleCount = 0;
      var group = dateGroups[currentGroupIdx];
      totalPages = group.totalPages;
      renderCurrentGroupPage();
      updateHeaderForGroup(group);
      if (totalPages > 1 || dateGroups.length > 1) startPageRotation();
    }

    async function forceReload() {
      var newData = await fetchData();
      stopAllTimers();
      currentPage = 0;
      currentGroupIdx = 0;
      groupCycleCount = 0;
      renderBoard(newData);
    }

    function onKeyDown(e) {
      if (e.key === "ArrowRight") { e.preventDefault(); advancePage(1); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); advancePage(-1); }
      else if (e.key === "n" || e.key === "N") { e.preventDefault(); advanceGroup(); }
      else if (e.key === "r" || e.key === "R") { e.preventDefault(); forceReload(); }
    }

    // ===== 初期化 =====
    async function initBoard() {
      ROWS_PER_PAGE = calcRowsPerPage();
      startClock();

      var data = await fetchData();
      renderBoard(data);

      // 5分ごとにデータ再取得
      setInterval(async function() {
        var newData = await fetchData();
        stopAllTimers();
        currentPage = 0;
        currentGroupIdx = 0;
        groupCycleCount = 0;
        renderBoard(newData);
      }, REFRESH_MS);

      window.addEventListener("resize", onResize);
      document.addEventListener("click", toggleFullscreen);
      document.addEventListener("keydown", onKeyDown);
      requestFullscreen();
      acquireWakeLock();
    }

    document.addEventListener("DOMContentLoaded", initBoard);

    // ===== テーマプレビュー (?preview=1) =====
    (function() {
      if (new URLSearchParams(location.search).get("preview") !== "1") return;
      var THEMES = {
        navy:     { label: "現状Navy",     main: "#1a2e5a", accent: "#2c4a8a", tomorrow: "#3a5aa3" },
        midnight: { label: "深夜Midnight", main: "#0f1e3a", accent: "#1a2e5a", tomorrow: "#2c4a8a" },
        charcoal: { label: "チャコール",    main: "#1f2937", accent: "#374151", tomorrow: "#4b5563" },
        teal:     { label: "ダークティール", main: "#115e59", accent: "#0f766e", tomorrow: "#14b8a6" },
        forest:   { label: "フォレスト",    main: "#14532d", accent: "#166534", tomorrow: "#15803d" },
        wine:     { label: "ワイン",        main: "#7f1d1d", accent: "#991b1b", tomorrow: "#b91c1c" },
        slate:    { label: "スレート",      main: "#334155", accent: "#475569", tomorrow: "#64748b" },
        indigo:   { label: "インディゴ",    main: "#312e81", accent: "#3730a3", tomorrow: "#4338ca" }
      };
      var NIGHT_SHADES = {
        dark:   { label: "夜A:暗",   color: "#243e6e" },
        mid:    { label: "夜B:中",   color: "#2e4d7d" },
        light:  { label: "夜C:明",   color: "#35588a" }
      };
      var BORDER_STRATEGIES = {
        none:     { label: "枠D:無し",     desc: "両方無し（色とバッジで識別）推し" },
        both:     { label: "枠A:両方",     desc: "夜=青/重点=橙(重複時は夜優先)" },
        priority: { label: "枠B:重点のみ", desc: "夜ボーダー無/重点のみ橙" },
        override: { label: "枠C:重点優先", desc: "両方、重複時は橙優先" }
      };
      var DENSITIES = {
        spacious: { label: "疎 80px", height: 80 },
        mid:      { label: "中 64px", height: 64 },
        dense:    { label: "密 56px", height: 56 },
        tight:    { label: "超密 48px", height: 48 }
      };
      var LAYOUTS = {
        top:    { label: "上詰め",   desc: "下に隙間ができる" },
        center: { label: "中央",     desc: "少数時は中央配置（推し）" },
        fill:   { label: "フル伸長", desc: "全部フッターまで伸ばす" }
      };
      var state = { theme: "charcoal", night: "mid", border: "none", density: "spacious", layout: "top" };

      function buildNightCss(n) {
        return ".board-row.row-night.row-even, .board-row.row-night.row-odd { background: " + n.color + " !important; }";
      }
      function buildBorderCss(strategy) {
        if (strategy === "none") {
          return [
            ".board-row.row-priority.row-even, .board-row.row-priority.row-odd { border-left: 0 !important; }",
            ".board-row.row-night.row-even, .board-row.row-night.row-odd { border-left: 0 !important; }"
          ].join("\n");
        }
        if (strategy === "both") {
          return [
            ".board-row.row-priority.row-even, .board-row.row-priority.row-odd { border-left: 10px solid #f59e0b !important; }",
            ".board-row.row-night.row-even, .board-row.row-night.row-odd { border-left: 10px solid #7aa7d9 !important; }"
          ].join("\n");
        }
        if (strategy === "priority") {
          return [
            ".board-row.row-priority.row-even, .board-row.row-priority.row-odd { border-left: 10px solid #f59e0b !important; }",
            ".board-row.row-night.row-even, .board-row.row-night.row-odd { border-left: 0 !important; }",
            ".board-row.row-night.row-priority.row-even, .board-row.row-night.row-priority.row-odd { border-left: 10px solid #f59e0b !important; }"
          ].join("\n");
        }
        // override: both shown, but priority wins on conflict
        return [
          ".board-row.row-night.row-even, .board-row.row-night.row-odd { border-left: 10px solid #7aa7d9 !important; }",
          ".board-row.row-priority.row-even, .board-row.row-priority.row-odd { border-left: 10px solid #f59e0b !important; }",
          ".board-row.row-priority.row-night.row-even, .board-row.row-priority.row-night.row-odd { border-left: 10px solid #f59e0b !important; }"
        ].join("\n");
      }

      function render() {
        var t = THEMES[state.theme];
        var n = NIGHT_SHADES[state.night];
        var d = DENSITIES[state.density];
        var root = document.documentElement;
        root.style.setProperty("--accent-navy", t.main);
        root.style.setProperty("--bg-table-header", t.main);
        root.style.setProperty("--accent-navy-light", t.accent);
        var s = document.getElementById("theme-override") || (function() {
          var el = document.createElement("style"); el.id = "theme-override"; document.head.appendChild(el); return el;
        })();
        s.textContent = [
          ".header-today-label { background: " + t.main + " !important; }",
          ".header-today-label.label-tomorrow { background: " + t.accent + " !important; }",
          ".date-section-header { background: " + t.main + " !important; }",
          ".date-section-header.section-tomorrow { background: " + t.tomorrow + " !important; }",
          ".board-header { border-bottom-color: " + t.main + " !important; }",
          ".board-footer { border-top-color: " + t.main + " !important; }",
          buildNightCss(n),
          buildBorderCss(state.border)
        ].join("\n");
        // 行密度 + レイアウト適用
        try {
          MIN_ROW_HEIGHT = d.height;
          window.__layoutMode = state.layout;
          if (dateGroups && dateGroups.length > 0) {
            stopAllTimers();
            ROWS_PER_PAGE = calcRowsPerPage();
            dateGroups.forEach(function(g) { g.totalPages = Math.ceil(g.items.length / ROWS_PER_PAGE); });
            var group = dateGroups[currentGroupIdx];
            totalPages = group.totalPages;
            if (currentPage >= totalPages) currentPage = 0;
            renderCurrentGroupPage();
            if (totalPages > 1 || dateGroups.length > 1) startPageRotation();
          }
        } catch (e) {}
        // selected button highlighting
        document.querySelectorAll(".tp-btn").forEach(function(b) {
          var sel = (b.dataset.group === "theme" && b.dataset.key === state.theme)
                 || (b.dataset.group === "night" && b.dataset.key === state.night)
                 || (b.dataset.group === "border" && b.dataset.key === state.border)
                 || (b.dataset.group === "density" && b.dataset.key === state.density)
                 || (b.dataset.group === "layout" && b.dataset.key === state.layout);
          b.style.background = sel ? t.main : "#fff";
          b.style.color = sel ? "#fff" : "#333";
          b.style.borderColor = sel ? t.main : "#ccc";
        });
        try { localStorage.setItem("tp-state", JSON.stringify(state)); } catch(e){}
      }

      function makeRow(title, group, options) {
        var row = document.createElement("div");
        row.style.cssText = "display:flex;gap:4px;align-items:center;flex-wrap:wrap;";
        var lbl = document.createElement("span");
        lbl.textContent = title;
        lbl.style.cssText = "font-size:11px;color:#666;min-width:48px;font-weight:700;";
        row.appendChild(lbl);
        Object.keys(options).forEach(function(key) {
          var btn = document.createElement("button");
          btn.className = "tp-btn";
          btn.dataset.group = group;
          btn.dataset.key = key;
          btn.textContent = options[key].label;
          btn.style.cssText = "padding:4px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:12px;";
          btn.title = options[key].desc || "";
          btn.onclick = function() { state[group] = key; render(); };
          row.appendChild(btn);
        });
        return row;
      }

      var bar = document.createElement("div");
      bar.style.cssText = "position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(255,255,255,0.95);padding:8px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;flex-direction:column;gap:4px;font-family:sans-serif;";
      bar.appendChild(makeRow("ヘッダー", "theme", THEMES));
      bar.appendChild(makeRow("夜の色", "night", NIGHT_SHADES));
      bar.appendChild(makeRow("左ボーダー", "border", BORDER_STRATEGIES));
      bar.appendChild(makeRow("行密度", "density", DENSITIES));
      bar.appendChild(makeRow("行配置", "layout", LAYOUTS));
      document.body.appendChild(bar);

      try {
        var saved = JSON.parse(localStorage.getItem("tp-state"));
        if (saved && typeof saved === "object") {
          ["theme","night","border","density","layout"].forEach(function(k) {
            if (saved[k]) state[k] = saved[k];
          });
        }
      } catch(e){}
      render();
    })();
  </script>
</body>
</html>
