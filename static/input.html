<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事予定表 - 入力</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f7fa; color: #333;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    .app-header {
      background: linear-gradient(135deg, #1A2E5A 0%, #2c4a8a 100%);
      color: #fff; padding: 14px 20px 8px; flex-shrink: 0;
    }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
    }
    .app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .header-links { display: flex; gap: 16px; }
    .header-links a { color: rgba(255,255,255,0.7); font-size: 12px; text-decoration: none; }
    .header-links a:hover { color: #fff; }

    /* === User Tabs === */
    .user-tabs {
      display: flex; gap: 0; margin-top: 12px; border-bottom: 2px solid rgba(255,255,255,0.15);
    }
    .user-tab {
      background: transparent; border: none; color: rgba(255,255,255,0.6);
      padding: 10px 24px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; border-bottom: 3px solid transparent;
      transition: all 0.2s; position: relative; top: 2px;
    }
    .user-tab:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.08); }
    .user-tab.active {
      color: #fff; border-bottom-color: #fff;
      background: rgba(255,255,255,0.1);
    }

    /* === Toolbar === */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; gap: 12px; flex-wrap: wrap; padding-bottom: 10px;
    }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-nav button {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 6px; font-size: 16px;
      cursor: pointer; transition: background 0.2s;
    }
    .month-nav button:hover { background: rgba(255,255,255,0.3); }
    .month-label { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    .add-proj-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 7px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .add-proj-btn:hover { background: rgba(255,255,255,0.35); }

    /* === Legend === */
    .legend {
      display: flex; gap: 14px; align-items: center;
      font-size: 11px; color: rgba(255,255,255,0.8);
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .lsw { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }
    .lsw.l-day { background: #60a5fa; }
    .lsw.l-night { background: #fbbf24; }
    .lsw.l-both { background: linear-gradient(to bottom, #60a5fa 50%, #fbbf24 50%); }
    .lsw.l-off { background: #d1d5db; }
    .lsw.l-pri { background: #60a5fa; position: relative; }
    .lsw.l-pri::after {
      content: ''; position: absolute; top: 1px; right: 1px;
      width: 5px; height: 5px; background: #ef4444; border-radius: 50%;
    }

    /* === Person Selection === */
    .person-select {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 24px; padding: 40px 20px;
    }
    .person-select h2 { font-size: 20px; color: #1A2E5A; font-weight: 700; }
    .person-grid {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    }
    .person-btn {
      background: #fff; border: 2px solid #d0d5dd; border-radius: 14px;
      padding: 28px 40px; font-size: 20px; font-weight: 700; color: #1A2E5A;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
      min-width: 160px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .person-btn:hover { border-color: #1A2E5A; background: #f0f3fa; box-shadow: 0 4px 16px rgba(26,46,90,0.12); }
    .person-btn .person-count { font-size: 12px; font-weight: 400; color: #888; margin-top: 6px; }
    .person-btn .excel-tag {
      display: inline-block; font-size: 10px; font-weight: 600;
      background: #dcfce7; color: #166534; padding: 2px 8px;
      border-radius: 4px; margin-top: 6px;
    }

    /* === Gantt Area === */
    .main { flex: 1; overflow: hidden; position: relative; }
    .gantt-wrapper { width: 100%; height: 100%; overflow: auto; }
    .gantt {
      border-collapse: separate; border-spacing: 0;
      border-left: 1px solid #d1d5db; border-top: 1px solid #d1d5db;
    }
    .gantt th, .gantt td {
      border-right: 1px solid #d1d5db; border-bottom: 1px solid #d1d5db;
      padding: 0; text-align: center; vertical-align: middle;
      white-space: nowrap;
    }

    /* Sticky columns */
    .s0, .s1, .s2 { position: sticky; z-index: 2; }
    .s0 { left: 0; width: 30px; min-width: 30px; }
    .s1 { left: 30px; width: 190px; min-width: 190px; max-width: 190px; }
    .s2 { left: 220px; width: 50px; min-width: 50px; }
    thead th { position: sticky; top: 0; z-index: 3; }
    thead th.s0, thead th.s1, thead th.s2 { z-index: 5; }
    tbody td.s0, tbody td.s1, tbody td.s2 { background: #fff; z-index: 2; }
    tbody tr:hover td.s0, tbody tr:hover td.s1, tbody tr:hover td.s2 { background: #f0f3fa; }

    /* Header cells */
    .gh {
      background: #1A2E5A; color: #fff;
      font-size: 11px; font-weight: 600; padding: 8px 4px;
    }
    .dh {
      background: #f8f9fb; color: #444;
      font-size: 12px; font-weight: 600; padding: 4px 2px;
      width: 36px; min-width: 36px; max-width: 36px;
    }
    .dh .dow { font-size: 10px; font-weight: 400; color: #999; }
    .dh.sun { color: #dc2626; }
    .dh.sun .dow { color: #dc2626; }
    .dh.sat { color: #2563eb; }
    .dh.sat .dow { color: #2563eb; }
    .dh.today-col { background: #dbeafe; }
    .dh.week-border { border-right: 2px solid #9ca3af; }

    /* Body: sticky info cells */
    .sc { text-align: left; padding: 4px 6px; font-size: 12px; line-height: 1.4; }
    .sc .pclient { font-size: 10px; color: #888; }
    .s1.sc {
      overflow: hidden; text-overflow: ellipsis;
      max-width: 190px; font-weight: 500; color: #1A2E5A;
    }
    .s2.sc { font-size: 11px; color: #555; text-align: center; }
    .s2.sc { border-right: 2px solid #b0b8c8; }
    thead th.s2 { border-right: 2px solid #0f1f3e; }
    tbody tr:hover td { background-color: rgba(219,234,254,0.15); }
    .ebtn {
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: #1A2E5A; padding: 2px;
      border-radius: 4px; transition: background 0.2s;
    }
    .ebtn:hover { background: #e0e7f5; }

    /* Gantt cells */
    .gc {
      width: 36px; min-width: 36px; max-width: 36px; height: 42px;
      position: relative; transition: filter 0.1s;
    }
    .gc.sun-bg { background: #fef2f2; }
    .gc.sat-bg { background: #eff6ff; }
    .gc.today-bg { background: #dbeafe; }
    .gc.week-border { border-right: 2px solid #9ca3af; }

    /* In-range cells: continuous bar look */
    .gc.ir { cursor: pointer; }
    .gc.ir:hover { filter: brightness(0.92); }
    .gc.ir.day { background: #60a5fa; }
    .gc.ir.ngt { background: #fbbf24; }
    .gc.ir.dn { background: linear-gradient(to bottom, #60a5fa 50%, #fbbf24 50%); }
    .gc.ir.off { background: #d1d5db; }
    /* Remove internal borders for continuous bar */
    .gc.ir.bar-mid { border-right-color: transparent; }
    .gc.ir.bar-mid.week-border { border-right: 2px solid rgba(156,163,175,0.4); }
    /* Rounded corners on first/last cells */
    .gc.ir.bar-start { border-radius: 6px 0 0 6px; }
    .gc.ir.bar-end { border-radius: 0 6px 6px 0; border-right-color: #d1d5db; }
    .gc.ir.bar-start.bar-end { border-radius: 6px; }
    /* Month overflow arrows */
    .bar-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 2px rgba(0,0,0,0.3); z-index: 1;
    }
    .bar-arrow.left { left: 2px; }
    .bar-arrow.right { right: 2px; }
    .pri-dot {
      position: absolute; top: 3px; right: 3px;
      width: 7px; height: 7px; background: #ef4444;
      border-radius: 50%; border: 1px solid #fff;
    }
    /* Adjacent month projects (from today/tomorrow month) */
    tr.adj-row .adj-badge {
      display: inline-block; font-size: 9px; font-weight: 600;
      background: #1A2E5A; color: #fff; padding: 1px 6px;
      border-radius: 3px; margin-left: 4px;
    }

    /* === Save Footer === */
    .save-footer {
      flex-shrink: 0; background: #fff; border-top: 2px solid #e0e0e0;
      padding: 10px 20px; display: flex; align-items: center; gap: 16px;
    }
    .save-footer.dirty { border-top-color: #1A2E5A; }
    .save-btn {
      background: #1A2E5A; color: #fff; border: none;
      padding: 10px 28px; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .save-btn:not(:disabled):hover { background: #2a4070; }
    .save-status { font-size: 13px; color: #666; }
    .save-status.error { color: #dc2626; }
    .save-status.success { color: #16a34a; }

    /* === Empty & Loading === */
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 16px; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #aaa;
      font-size: 15px; line-height: 1.8;
    }

    /* === Project Modal === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #fff; border-radius: 14px; width: 100%;
      max-width: 520px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 {
      font-size: 18px; font-weight: 700; color: #1A2E5A;
      padding: 20px 24px 0; letter-spacing: 1px;
    }
    .modal-body { padding: 16px 24px; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: #555; margin-bottom: 4px;
    }
    .form-group input {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd;
      border-radius: 8px; font-size: 15px; font-family: inherit;
    }
    .form-group input:focus { outline: none; border-color: #1A2E5A; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .modal-actions {
      display: flex; gap: 10px; padding: 16px 24px 20px;
      border-top: 1px solid #eee;
    }
    .btn-primary {
      flex: 1; background: #1A2E5A; color: #fff; border: none;
      padding: 12px; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover { background: #2a4070; }
    .btn-danger {
      background: #dc2626; color: #fff; border: none;
      padding: 12px 20px; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-cancel {
      background: #f0f0f0; color: #666; border: none;
      padding: 12px 20px; border-radius: 8px; font-size: 15px;
      cursor: pointer; font-family: inherit;
    }
    .btn-cancel:hover { background: #e0e0e0; }
    .hidden { display: none !important; }

    /* === Day Editor Modal === */
    .dm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 110; padding: 20px;
    }
    .dm-overlay.hidden { display: none; }
    .dm {
      background: #fff; border-radius: 14px; width: 100%;
      max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .dm-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 20px 12px; border-bottom: 1px solid #eee;
    }
    .dm-header-info h3 { font-size: 14px; font-weight: 700; color: #1A2E5A; margin-bottom: 2px; }
    .dm-header-info .dm-proj-name { font-size: 12px; color: #888; margin-bottom: 4px; }
    .dm-date-nav { display: flex; align-items: center; gap: 8px; }
    .dm-date-nav button {
      background: #f0f3fa; border: none; width: 28px; height: 28px;
      border-radius: 6px; font-size: 14px; cursor: pointer; color: #1A2E5A;
    }
    .dm-date-nav button:hover { background: #dde3f0; }
    .dm-date-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
    .dm-date-label { font-size: 16px; font-weight: 700; color: #1A2E5A; }
    .dm-date-label.sun { color: #dc2626; }
    .dm-date-label.sat { color: #2563eb; }
    .dm-close {
      background: none; border: none; font-size: 22px;
      color: #999; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .dm-close:hover { color: #333; }
    .dm-body { padding: 16px 20px; }
    .dm-section { margin-bottom: 14px; padding: 12px; background: #f8f9fb; border-radius: 8px; }
    .dm-section.night-section { background: #fffbeb; }
    .dm-section .check-label {
      font-size: 14px; font-weight: 600; color: #333;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none; margin-bottom: 8px;
    }
    .dm-section .check-label input { width: 16px; height: 16px; accent-color: #1A2E5A; }
    .dm-fields { display: flex; flex-direction: column; gap: 8px; }
    .dm-fields input[type="text"], .dm-fields select {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 14px; font-family: inherit;
    }
    .dm-fields input:focus, .dm-fields select:focus { outline: none; border-color: #1A2E5A; }
    .dm-fields select { background: #fff; }
    .dm-fields .dm-row { display: flex; gap: 8px; }
    .dm-fields .dm-row > * { flex: 1; }
    .dm-fields .dm-label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .dm-persons { margin-top: 10px; padding: 10px 12px; background: #f8f9fb; border-radius: 8px; }
    .dm-persons summary { font-size: 13px; color: #1A2E5A; cursor: pointer; font-weight: 500; }
    .dm-persons .dm-pgrid {
      display: grid; grid-template-columns: auto 1fr; gap: 6px 8px;
      margin-top: 10px; align-items: center;
    }
    .dm-persons .dm-pgrid label { font-size: 12px; color: #666; white-space: nowrap; }
    .dm-persons .dm-pgrid input {
      padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .dm-persons .dm-pgrid input:focus { outline: none; border-color: #1A2E5A; }

    @media (max-width: 600px) {
      .legend { display: none; }
      .s1 { width: 140px; min-width: 140px; max-width: 140px; }
      .s2 { left: 170px; }
      .user-tab { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1>工事予定表 入力</h1>
      <div class="header-links">
        <a href="/">サイネージ表示</a>
        <a href="/admin.html">管理</a>
        <a href="/manual.html">マニュアル</a>
      </div>
    </div>

    <div class="user-tabs" id="user-tabs" style="display:none">
      <button class="user-tab" data-user="手島" onclick="switchUser('手島')">手島</button>
      <button class="user-tab" data-user="森_吉村" onclick="switchUser('森_吉村')">森_吉村</button>
      <button class="user-tab" data-user="谷口" onclick="switchUser('谷口')">谷口</button>
    </div>

    <div class="toolbar" id="toolbar" style="display:none">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#9664;</button>
        <span class="month-label" id="month-label"></span>
        <button onclick="changeMonth(1)">&#9654;</button>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="lsw l-day"></span>昼</span>
        <span class="legend-item"><span class="lsw l-night"></span>夜</span>
        <span class="legend-item"><span class="lsw l-both"></span>昼+夜</span>
        <span class="legend-item"><span class="lsw l-off"></span>休み</span>
        <span class="legend-item"><span class="lsw l-pri"></span>重点</span>
      </div>
      <button class="add-proj-btn" onclick="openModal()">+ 案件追加</button>
    </div>
  </header>

  <main class="main" id="main"></main>

  <div class="save-footer" id="save-footer" style="display:none">
    <button class="save-btn" id="save-btn" disabled onclick="saveData()">保存</button>
    <span class="save-status" id="save-status"></span>
  </div>

  <!-- 案件モーダル -->
  <div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modal-title">案件追加</h2>
      <div class="modal-body">
        <div class="form-group">
          <label>客先</label>
          <input id="m-client" type="text" placeholder="例: きんでん">
        </div>
        <div class="form-group">
          <label>工事件名</label>
          <input id="m-title" type="text" placeholder="例: 麻布台ヒルズ森JPタワーSB新設工事">
        </div>
        <div class="form-row">
          <div class="form-group"><label>現場担当者</label><input id="m-our" type="text" placeholder="例: 西潟"></div>
          <div class="form-group"><label>安品担当者</label><input id="m-safety" type="text"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>協力会社名</label><input id="m-partner" type="text" placeholder="例: 萩原通信"></div>
          <div class="form-group"><label>協力会社担当者</label><input id="m-partner-person" type="text"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>開始日</label><input id="m-start" type="date"></div>
          <div class="form-group"><label>終了日</label><input id="m-end" type="date"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveProject()">保存</button>
        <button class="btn-danger hidden" id="modal-delete" onclick="deleteProject()">削除</button>
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 日次エディタモーダル -->
  <div class="dm-overlay hidden" id="dm-overlay" onclick="if(event.target===this)closeDayEditor()">
    <div class="dm">
      <div class="dm-header">
        <div class="dm-header-info">
          <div class="dm-proj-name" id="dm-proj-name"></div>
          <div class="dm-date-nav">
            <button id="dm-prev" onclick="dmNav(-1)">&#9664;</button>
            <span class="dm-date-label" id="dm-date-label"></span>
            <button id="dm-next" onclick="dmNav(1)">&#9654;</button>
          </div>
        </div>
        <button class="dm-close" onclick="closeDayEditor()">&times;</button>
      </div>
      <div class="dm-body">
        <div class="dm-section">
          <label class="check-label">
            <input type="checkbox" id="dm-day-on" onchange="onDmToggle('day',this.checked)"> 昼の工事
          </label>
          <div class="dm-fields" id="dm-day-fields">
            <div>
              <div class="dm-label">工事内容</div>
              <input type="text" id="dm-day-work" placeholder="工事内容" oninput="onDmField('day_work',this.value)">
            </div>
            <div class="dm-row">
              <div>
                <div class="dm-label">重点工事</div>
                <select id="dm-day-pri" onchange="onDmField('day_priority',this.value)">
                  <option value="">無</option><option value="有">有</option>
                </select>
              </div>
              <div>
                <div class="dm-label">重点内容</div>
                <input type="text" id="dm-day-detail" placeholder="重点内容" oninput="onDmField('day_priority_detail',this.value)">
              </div>
            </div>
          </div>
        </div>
        <div class="dm-section night-section">
          <label class="check-label">
            <input type="checkbox" id="dm-night-on" onchange="onDmToggle('night',this.checked)"> 夜間工事
          </label>
          <div class="dm-fields" id="dm-night-fields" style="display:none">
            <div>
              <div class="dm-label">工事内容</div>
              <input type="text" id="dm-night-work" placeholder="工事内容" oninput="onDmField('night_work',this.value)">
            </div>
            <div class="dm-row">
              <div>
                <div class="dm-label">重点工事</div>
                <select id="dm-night-pri" onchange="onDmField('night_priority',this.value)">
                  <option value="">無</option><option value="有">有</option>
                </select>
              </div>
              <div>
                <div class="dm-label">重点内容</div>
                <input type="text" id="dm-night-detail" placeholder="重点内容" oninput="onDmField('night_priority_detail',this.value)">
              </div>
            </div>
          </div>
        </div>
        <details class="dm-persons">
          <summary>担当者変更</summary>
          <div class="dm-pgrid">
            <label>昼 現場:</label><input type="text" id="dm-day-our" oninput="onDmField('day_our_person',this.value)">
            <label>昼 安品:</label><input type="text" id="dm-day-safety" oninput="onDmField('day_safety_person',this.value)">
            <label>夜 現場:</label><input type="text" id="dm-night-our" oninput="onDmField('night_our_person',this.value)">
            <label>夜 安品:</label><input type="text" id="dm-night-safety" oninput="onDmField('night_safety_person',this.value)">
          </div>
        </details>
      </div>
    </div>
  </div>

  <script>
    // ===== 定数 =====
    var API = "/.netlify/functions/data";
    var WEEKDAYS = ["日","月","火","水","木","金","土"];
    var KNOWN_MEMBERS = ["手島", "森_吉村", "谷口"];

    // ===== 状態 =====
    var state = {
      user: null,     // 選択中の担当者 (nullなら選択画面)
      month: "",
      data: { projects: [], daily: {} },
      sha: null,
      adjProjects: [], // 隣月からの案件 [{ proj, daily, fromMonth }]
      editingId: null,
      dirty: false,
      loading: false
    };
    var dmState = { projId: null, dateStr: null };

    // ===== ユーティリティ =====
    function genId() { return Math.random().toString(36).substr(2, 8); }

    function esc(s) {
      if (s == null) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function formatMonth(yymm) {
      return (2000 + parseInt(yymm.slice(0,2))) + "年 " + parseInt(yymm.slice(2,4)) + "月";
    }

    function getCurrentMonth() {
      var n = new Date();
      return String(n.getFullYear()%100).padStart(2,"0") + String(n.getMonth()+1).padStart(2,"0");
    }

    function addMonths(yymm, delta) {
      var y = 2000 + parseInt(yymm.slice(0,2));
      var m = parseInt(yymm.slice(2,4)) - 1 + delta;
      var d = new Date(y, m, 1);
      return String(d.getFullYear()%100).padStart(2,"0") + String(d.getMonth()+1).padStart(2,"0");
    }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    }

    function dateStr(y, m, d) {
      return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    }

    function fmtDateShort(ds) {
      var p = ds.split("-");
      var d = new Date(+p[0], +p[1]-1, +p[2]);
      return (+p[1]) + "/" + (+p[2]) + " (" + WEEKDAYS[d.getDay()] + ")";
    }

    function getDayData(projId, ds) {
      return state.data.daily[projId + "/" + ds] || null;
    }

    function ensureDaily(projId, ds) {
      var key = projId + "/" + ds;
      if (!state.data.daily[key]) {
        state.data.daily[key] = {
          day: true, day_work: "", day_priority: "", day_priority_detail: "",
          day_our_person: "", day_safety_person: "",
          night: false, night_work: "", night_priority: "", night_priority_detail: "",
          night_our_person: "", night_safety_person: ""
        };
      }
      return state.data.daily[key];
    }

    // ===== ハッシュ管理 =====
    // 形式: #USER/YYMM (例: #手島/2604)
    function parseHash() {
      var h = decodeURIComponent(window.location.hash.replace("#",""));
      var parts = h.split("/");
      if (parts.length === 2 && /^\d{4}$/.test(parts[1])) {
        return { user: parts[0], month: parts[1] };
      }
      if (parts.length === 1 && parts[0]) {
        return { user: parts[0], month: getCurrentMonth() };
      }
      return { user: null, month: getCurrentMonth() };
    }

    function setHash(user, month) {
      if (user) {
        window.location.hash = encodeURIComponent(user) + "/" + month;
      } else {
        window.location.hash = "";
      }
    }

    // ===== API =====
    async function loadData(month) {
      state.loading = true;
      state.adjProjects = [];
      document.getElementById("main").innerHTML = '<div class="loading">読み込み中...</div>';
      try {
        var userEnc = encodeURIComponent(state.user);

        // today/tomorrowの月を追加取得（表示月と重複しないもの）
        var todayMonth = getCurrentMonth();
        var tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        var tomorrowMonth = String(tmr.getFullYear() % 100).padStart(2, "0") + String(tmr.getMonth() + 1).padStart(2, "0");
        var extraMonths = [];
        if (todayMonth !== month) extraMonths.push(todayMonth);
        if (tomorrowMonth !== month && tomorrowMonth !== todayMonth) extraMonths.push(tomorrowMonth);

        // 当月 + today/tomorrowの月を並列取得
        var fetchPromises = [
          fetch(API + "?month=" + month + "&user=" + userEnc).then(function(r) { return r.ok ? r.json() : null; })
        ];
        extraMonths.forEach(function(em) {
          fetchPromises.push(
            fetch(API + "?month=" + em + "&user=" + userEnc).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; })
          );
        });
        var results = await Promise.all(fetchPromises);

        var cur = results[0];
        if (!cur) throw new Error("データ取得失敗");
        state.data = { projects: cur.projects || [], daily: cur.daily || {} };
        state.sha = cur._sha || null;
        state.dirty = false;
        updateDirtyUI();

        // 当月の日付範囲
        var yy = parseInt(month.slice(0,2)), mm = parseInt(month.slice(2,4));
        var year = 2000 + yy;
        var monthStart = dateStr(year, mm, 1);
        var monthEnd = dateStr(year, mm, new Date(year, mm, 0).getDate());
        var curIds = {};
        state.data.projects.forEach(function(p) { curIds[p.id] = true; });

        // 追加月の案件: 表示月の日付範囲にオーバーラップするもの
        for (var ei = 0; ei < extraMonths.length; ei++) {
          var extraData = results[1 + ei];
          var extraMonth = extraMonths[ei];
          if (extraData && extraData.projects) {
            extraData.projects.forEach(function(p) {
              if (p.start_date <= monthEnd && p.end_date >= monthStart && !curIds[p.id]) {
                state.adjProjects.push({ proj: p, daily: extraData.daily || {}, fromMonth: extraMonth });
                curIds[p.id] = true;
              }
            });
          }
        }
      } catch (e) {
        state.data = { projects: [], daily: {} };
        state.sha = null;
        state.adjProjects = [];
        showStatus("読み込み失敗: " + e.message, "error");
      }
      state.loading = false;
      renderGantt();
    }

    async function loadMembers() {
      try {
        var res = await fetch(API + "?month=" + state.month);
        if (!res.ok) return [];
        var d = await res.json();
        return d.members || [];
      } catch (e) {
        return [];
      }
    }

    async function saveData() {
      if (!state.dirty) return;
      var btn = document.getElementById("save-btn");
      btn.disabled = true; showStatus("保存中...", "");
      try {
        var res = await fetch(API, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ month: state.month, user: state.user, data: state.data, sha: state.sha })
        });
        var result = await res.json();
        if (res.status === 409) { showStatus(result.error, "error"); btn.disabled = false; return; }
        if (!res.ok) throw new Error(result.error || "保存失敗");
        state.sha = result.sha;
        state.dirty = false; updateDirtyUI();
        showStatus("保存しました", "success");
        setTimeout(function() { if (!state.dirty) showStatus("",""); }, 3000);
      } catch (e) {
        showStatus("保存エラー: " + e.message, "error");
      }
      btn.disabled = !state.dirty;
    }

    // ===== UI =====
    function markDirty() { state.dirty = true; updateDirtyUI(); }

    function updateDirtyUI() {
      var btn = document.getElementById("save-btn");
      var footer = document.getElementById("save-footer");
      btn.disabled = !state.dirty;
      footer.classList.toggle("dirty", state.dirty);
    }

    function showStatus(msg, type) {
      var el = document.getElementById("save-status");
      el.textContent = msg;
      el.className = "save-status" + (type ? " " + type : "");
    }

    // ===== User Tabs =====
    function updateUserTabs() {
      var tabs = document.querySelectorAll(".user-tab");
      tabs.forEach(function(tab) {
        tab.classList.toggle("active", tab.dataset.user === state.user);
      });
    }

    function switchUser(user) {
      if (state.user === user) return;
      if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) return;
      state.user = user;
      state.dirty = false;
      setHash(user, state.month);
      updateUserTabs();
      loadData(state.month);
    }

    // ===== 画面切り替え =====
    function showGanttMode() {
      document.getElementById("user-tabs").style.display = "";
      document.getElementById("toolbar").style.display = "";
      document.getElementById("save-footer").style.display = "";
      document.getElementById("month-label").textContent = formatMonth(state.month);
      updateUserTabs();
    }

    function showPersonSelectMode() {
      document.getElementById("user-tabs").style.display = "none";
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("save-footer").style.display = "none";
    }

    function selectUser(user) {
      if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) return;
      state.user = user;
      state.dirty = false;
      setHash(user, state.month);
      showGanttMode();
      loadData(state.month);
    }

    function goPersonSelect() {
      if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) return;
      state.user = null;
      state.dirty = false;
      setHash(null, state.month);
      showPersonSelectMode();
      renderPersonSelect();
    }

    // ===== 月ナビ =====
    function changeMonth(delta) {
      if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) return;
      var newMonth = addMonths(state.month, delta);
      state.month = newMonth;
      state.dirty = false;
      setHash(state.user, newMonth);
      document.getElementById("month-label").textContent = formatMonth(newMonth);
      loadData(newMonth);
    }

    // ===== 担当者選択画面 =====
    async function renderPersonSelect() {
      var main = document.getElementById("main");
      main.innerHTML = '<div class="loading">担当者情報を取得中...</div>';

      var apiMembers = await loadMembers();
      // KNOWN_MEMBERS + APIから取得した担当者をマージ（重複排除）
      var allMembers = KNOWN_MEMBERS.slice();
      apiMembers.forEach(function(m) {
        if (allMembers.indexOf(m) === -1) allMembers.push(m);
      });

      var html = '<div class="person-select">';
      html += '<h2>入力担当者を選んでください</h2>';
      html += '<div class="person-grid">';
      for (var i = 0; i < allMembers.length; i++) {
        var name = allMembers[i];
        var hasData = apiMembers.indexOf(name) >= 0;
        html += '<button class="person-btn" onclick="selectUser(\'' + esc(name) + '\')">';
        html += esc(name);
        if (name === "手島") html += '<div class="excel-tag">Excel同期</div>';
        if (hasData) html += '<div class="person-count">データあり</div>';
        else html += '<div class="person-count">新規</div>';
        html += '</button>';
      }
      html += '</div></div>';
      main.innerHTML = html;
    }

    // ===== ガントチャート描画 =====
    function renderGantt() {
      var main = document.getElementById("main");
      var projects = state.data.projects;

      if (projects.length === 0 && state.adjProjects.length === 0) {
        main.innerHTML = '<div class="empty-state">案件がありません。<br>「+ 案件追加」ボタンから追加してください。</div>';
        return;
      }

      var yy = parseInt(state.month.slice(0,2));
      var mm = parseInt(state.month.slice(2,4));
      var year = 2000 + yy;
      var dim = new Date(year, mm, 0).getDate();
      var today = todayStr();

      var monthStart = dateStr(year, mm, 1);
      var monthEnd = dateStr(year, mm, dim);

      var html = '<div class="gantt-wrapper" id="gantt-wrapper"><table class="gantt"><thead><tr>';
      html += '<th class="s0 gh"></th>';
      html += '<th class="s1 gh">工事件名</th>';
      html += '<th class="s2 gh">担当</th>';

      // Day header
      for (var d = 1; d <= dim; d++) {
        var ds = dateStr(year, mm, d);
        var dObj = new Date(year, mm-1, d);
        var dow = dObj.getDay();
        var cls = 'dh';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (ds === today) cls += ' today-col';
        if (dow === 0 && d < dim) cls += ' week-border';
        html += '<th class="' + cls + '">' + d + '<br><span class="dow">' + WEEKDAYS[dow] + '</span></th>';
      }
      html += '</tr></thead><tbody>';

      // Projects
      for (var i = 0; i < projects.length; i++) {
        var proj = projects[i];
        var overflowLeft = proj.start_date < monthStart;
        var overflowRight = proj.end_date > monthEnd;

        html += '<tr>';
        html += '<td class="s0 sc"><button class="ebtn" onclick="openModal(\'' + proj.id + '\')" title="編集">&#9998;</button></td>';
        html += '<td class="s1 sc" title="' + esc(proj.client) + ' / ' + esc(proj.title) + '">'
              + '<span class="pclient">' + esc(proj.client) + '</span><br>' + esc(proj.title) + '</td>';
        html += '<td class="s2 sc">' + esc(proj.our_person || '') + '</td>';

        for (var d = 1; d <= dim; d++) {
          var ds = dateStr(year, mm, d);
          var dObj = new Date(year, mm-1, d);
          var dow = dObj.getDay();
          var inRange = ds >= proj.start_date && ds <= proj.end_date;
          var isWeekBorder = dow === 0 && d < dim;

          if (!inRange) {
            var ecls = 'gc';
            if (dow === 0) ecls += ' sun-bg';
            else if (dow === 6) ecls += ' sat-bg';
            if (ds === today) ecls += ' today-bg';
            if (isWeekBorder) ecls += ' week-border';
            html += '<td class="' + ecls + '"></td>';
            continue;
          }

          var dd = getDayData(proj.id, ds);
          var dayOn = dd ? dd.day !== false : true;
          var nightOn = dd ? dd.night === true : false;
          var hasPri = (dd && dd.day_priority === "有") || (dd && dd.night_priority === "有");

          // Determine cell color class
          var cls = 'gc ir';
          if (dayOn && nightOn) cls += ' dn';
          else if (dayOn) cls += ' day';
          else if (nightOn) cls += ' ngt';
          else cls += ' off';

          // Continuous bar: first/mid/last
          var visStart = proj.start_date < monthStart ? monthStart : proj.start_date;
          var visEnd = proj.end_date > monthEnd ? monthEnd : proj.end_date;
          var isFirst = ds === visStart;
          var isLast = ds === visEnd;
          if (isFirst && isLast) cls += ' bar-start bar-end';
          else if (isFirst) cls += ' bar-start bar-mid';
          else if (isLast) cls += ' bar-end';
          else cls += ' bar-mid';
          if (isWeekBorder) cls += ' week-border';

          var tip = fmtDateShort(ds);
          if (dayOn) tip += ' 昼';
          if (nightOn) tip += ' 夜';
          if (hasPri) tip += ' [重点]';
          if (dd && dd.day_work) tip += '\n' + dd.day_work;
          if (dd && dd.night_work) tip += '\n(夜)' + dd.night_work;

          html += '<td class="' + cls + '" title="' + esc(tip) + '" onclick="openDayEditor(\'' + proj.id + '\',\'' + ds + '\')">';
          if (hasPri) html += '<span class="pri-dot"></span>';
          if (isFirst && overflowLeft) html += '<span class="bar-arrow left">◀</span>';
          if (isLast && overflowRight) html += '<span class="bar-arrow right">▶</span>';
          html += '</td>';
        }
        html += '</tr>';
      }

      // === Adjacent month projects (ghost rows) ===
      for (var ai = 0; ai < state.adjProjects.length; ai++) {
        var adjItem = state.adjProjects[ai];
        var adjProj = adjItem.proj;
        var adjDaily = adjItem.daily;
        var adjMonth = adjItem.fromMonth;
        var adjMonthLabel = parseInt(adjMonth.slice(2,4)) + '月';
        var adjOverLeft = adjProj.start_date < monthStart;
        var adjOverRight = adjProj.end_date > monthEnd;

        html += '<tr class="adj-row">';
        html += '<td class="s0 sc"></td>';
        html += '<td class="s1 sc" title="' + esc(adjProj.client) + ' / ' + esc(adjProj.title) + ' (' + adjMonthLabel + 'データ)">'
              + '<span class="pclient">' + esc(adjProj.client) + '</span><br>' + esc(adjProj.title)
              + '<span class="adj-badge">' + adjMonthLabel + '</span></td>';
        html += '<td class="s2 sc">' + esc(adjProj.our_person || '') + '</td>';

        for (var ad = 1; ad <= dim; ad++) {
          var ads = dateStr(year, mm, ad);
          var adObj = new Date(year, mm-1, ad);
          var adow = adObj.getDay();
          var aInRange = ads >= adjProj.start_date && ads <= adjProj.end_date;
          var aWeekBorder = adow === 0 && ad < dim;

          if (!aInRange) {
            var aecls = 'gc';
            if (adow === 0) aecls += ' sun-bg';
            else if (adow === 6) aecls += ' sat-bg';
            if (ads === today) aecls += ' today-bg';
            if (aWeekBorder) aecls += ' week-border';
            html += '<td class="' + aecls + '"></td>';
            continue;
          }

          var adjDd = adjDaily[adjProj.id + '/' + ads] || null;
          var aDayOn = adjDd ? adjDd.day !== false : true;
          var aNightOn = adjDd ? adjDd.night === true : false;
          var aHasPri = (adjDd && adjDd.day_priority === '有') || (adjDd && adjDd.night_priority === '有');

          var acls = 'gc ir';
          if (aDayOn && aNightOn) acls += ' dn';
          else if (aDayOn) acls += ' day';
          else if (aNightOn) acls += ' ngt';
          else acls += ' off';

          var aVisStart = adjProj.start_date < monthStart ? monthStart : adjProj.start_date;
          var aVisEnd = adjProj.end_date > monthEnd ? monthEnd : adjProj.end_date;
          var aIsFirst = ads === aVisStart;
          var aIsLast = ads === aVisEnd;
          if (aIsFirst && aIsLast) acls += ' bar-start bar-end';
          else if (aIsFirst) acls += ' bar-start bar-mid';
          else if (aIsLast) acls += ' bar-end';
          else acls += ' bar-mid';
          if (aWeekBorder) acls += ' week-border';

          var atip = fmtDateShort(ads) + ' (' + adjMonthLabel + 'データ)';
          if (aDayOn) atip += ' 昼';
          if (aNightOn) atip += ' 夜';

          html += '<td class="' + acls + '" title="' + esc(atip) + '" onclick="onAdjClick(\'' + adjMonth + '\')">';
          if (aHasPri) html += '<span class="pri-dot"></span>';
          if (aIsFirst && adjOverLeft) html += '<span class="bar-arrow left">◀</span>';
          if (aIsLast && adjOverRight) html += '<span class="bar-arrow right">▶</span>';
          html += '</td>';
        }
        html += '</tr>';
      }

      html += '</tbody></table></div>';
      main.innerHTML = html;
      scrollToToday();
    }

    function scrollToToday() {
      var wrapper = document.getElementById("gantt-wrapper");
      var th = document.querySelector(".today-col");
      if (wrapper && th) {
        wrapper.scrollLeft = Math.max(0, th.offsetLeft - 300);
      }
    }

    // ===== 日次エディタ =====
    function openDayEditor(projId, ds) {
      dmState.projId = projId;
      dmState.dateStr = ds;
      populateDayEditor();
      document.getElementById("dm-overlay").classList.remove("hidden");
    }

    function closeDayEditor() {
      document.getElementById("dm-overlay").classList.add("hidden");
      dmState.projId = null; dmState.dateStr = null;
      renderGantt();
    }

    function populateDayEditor() {
      var proj = state.data.projects.find(function(p) { return p.id === dmState.projId; });
      if (!proj) return;
      var ds = dmState.dateStr;
      var dd = getDayData(dmState.projId, ds);
      var dayOn = dd ? dd.day !== false : true;
      var nightOn = dd ? dd.night === true : false;

      document.getElementById("dm-proj-name").textContent = proj.client + " / " + proj.title;
      var p = ds.split("-");
      var dObj = new Date(+p[0], +p[1]-1, +p[2]);
      var dow = dObj.getDay();
      var lbl = document.getElementById("dm-date-label");
      lbl.textContent = (+p[1]) + "月" + (+p[2]) + "日 (" + WEEKDAYS[dow] + ")";
      lbl.className = "dm-date-label" + (dow===0?" sun":"") + (dow===6?" sat":"");

      document.getElementById("dm-prev").disabled = !getPrevDate(proj, ds);
      document.getElementById("dm-next").disabled = !getNextDate(proj, ds);

      document.getElementById("dm-day-on").checked = dayOn;
      document.getElementById("dm-day-fields").style.display = dayOn ? "" : "none";
      document.getElementById("dm-day-work").value = dd ? dd.day_work || "" : "";
      document.getElementById("dm-day-pri").value = dd ? dd.day_priority || "" : "";
      document.getElementById("dm-day-detail").value = dd ? dd.day_priority_detail || "" : "";

      document.getElementById("dm-night-on").checked = nightOn;
      document.getElementById("dm-night-fields").style.display = nightOn ? "" : "none";
      document.getElementById("dm-night-work").value = dd ? dd.night_work || "" : "";
      document.getElementById("dm-night-pri").value = dd ? dd.night_priority || "" : "";
      document.getElementById("dm-night-detail").value = dd ? dd.night_priority_detail || "" : "";

      document.getElementById("dm-day-our").value = dd ? dd.day_our_person || "" : "";
      document.getElementById("dm-day-our").placeholder = proj.our_person || "";
      document.getElementById("dm-day-safety").value = dd ? dd.day_safety_person || "" : "";
      document.getElementById("dm-day-safety").placeholder = proj.safety_person || "";
      document.getElementById("dm-night-our").value = dd ? dd.night_our_person || "" : "";
      document.getElementById("dm-night-our").placeholder = proj.our_person || "";
      document.getElementById("dm-night-safety").value = dd ? dd.night_safety_person || "" : "";
      document.getElementById("dm-night-safety").placeholder = proj.safety_person || "";
    }

    function getPrevDate(proj, ds) {
      var p = ds.split("-"); var d = new Date(+p[0], +p[1]-1, +p[2]);
      d.setDate(d.getDate() - 1);
      var s = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      return s >= proj.start_date ? s : null;
    }

    function getNextDate(proj, ds) {
      var p = ds.split("-"); var d = new Date(+p[0], +p[1]-1, +p[2]);
      d.setDate(d.getDate() + 1);
      var s = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      return s <= proj.end_date ? s : null;
    }

    function dmNav(delta) {
      var proj = state.data.projects.find(function(p) { return p.id === dmState.projId; });
      if (!proj) return;
      var next = (delta < 0 ? getPrevDate : getNextDate)(proj, dmState.dateStr);
      if (next) { dmState.dateStr = next; populateDayEditor(); }
    }

    function onDmToggle(field, checked) {
      var dd = ensureDaily(dmState.projId, dmState.dateStr);
      dd[field] = checked; markDirty();
      if (field === "day") document.getElementById("dm-day-fields").style.display = checked ? "" : "none";
      else document.getElementById("dm-night-fields").style.display = checked ? "" : "none";
    }

    function onDmField(field, value) {
      ensureDaily(dmState.projId, dmState.dateStr)[field] = value;
      markDirty();
    }

    // ===== 隣月案件クリック =====
    function onAdjClick(fromMonth) {
      if (state.dirty) {
        if (!confirm("未保存の変更があります。" + formatMonth(fromMonth) + " に切り替えますか？")) return;
      }
      state.month = fromMonth;
      state.dirty = false;
      setHash(state.user, fromMonth);
      document.getElementById("month-label").textContent = formatMonth(fromMonth);
      loadData(fromMonth);
    }

    // ===== 案件モーダル =====
    function openModal(id) {
      state.editingId = id || null;
      var modal = document.getElementById("modal");
      var title = document.getElementById("modal-title");
      var delBtn = document.getElementById("modal-delete");

      if (id) {
        var proj = state.data.projects.find(function(p) { return p.id === id; });
        if (!proj) return;
        title.textContent = "案件編集";
        delBtn.classList.remove("hidden");
        document.getElementById("m-client").value = proj.client || "";
        document.getElementById("m-title").value = proj.title || "";
        document.getElementById("m-our").value = proj.our_person || "";
        document.getElementById("m-safety").value = proj.safety_person || "";
        document.getElementById("m-partner").value = proj.partner || "";
        document.getElementById("m-partner-person").value = proj.partner_person || "";
        document.getElementById("m-start").value = proj.start_date || "";
        document.getElementById("m-end").value = proj.end_date || "";
      } else {
        title.textContent = "案件追加";
        delBtn.classList.add("hidden");
        var yy = parseInt(state.month.slice(0,2));
        var mm = parseInt(state.month.slice(2,4));
        var y = 2000 + yy;
        document.getElementById("m-client").value = "";
        document.getElementById("m-title").value = "";
        document.getElementById("m-our").value = "";
        document.getElementById("m-safety").value = "";
        document.getElementById("m-partner").value = "";
        document.getElementById("m-partner-person").value = "";
        document.getElementById("m-start").value = y + "-" + String(mm).padStart(2,"0") + "-01";
        document.getElementById("m-end").value = y + "-" + String(mm).padStart(2,"0") + "-" + String(new Date(y,mm,0).getDate()).padStart(2,"0");
      }
      modal.classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      state.editingId = null;
    }

    function saveProject() {
      var client = document.getElementById("m-client").value.trim();
      var title = document.getElementById("m-title").value.trim();
      var startDate = document.getElementById("m-start").value;
      var endDate = document.getElementById("m-end").value;
      if (!client || !title) { alert("客先と工事件名は必須です"); return; }
      if (!startDate || !endDate) { alert("開始日と終了日は必須です"); return; }
      if (startDate > endDate) { alert("終了日は開始日以降にしてください"); return; }

      var projData = {
        client: client, title: title,
        our_person: document.getElementById("m-our").value.trim(),
        safety_person: document.getElementById("m-safety").value.trim(),
        partner: document.getElementById("m-partner").value.trim(),
        partner_person: document.getElementById("m-partner-person").value.trim(),
        start_date: startDate, end_date: endDate
      };

      if (state.editingId) {
        var idx = state.data.projects.findIndex(function(p) { return p.id === state.editingId; });
        if (idx >= 0) { projData.id = state.editingId; state.data.projects[idx] = projData; }
      } else {
        projData.id = genId();
        state.data.projects.push(projData);
      }
      markDirty(); closeModal(); renderGantt();
    }

    function deleteProject() {
      if (!state.editingId) return;
      if (!confirm("この案件を削除しますか？\n関連する日次データも削除されます。")) return;
      var id = state.editingId;
      state.data.projects = state.data.projects.filter(function(p) { return p.id !== id; });
      var prefix = id + "/";
      Object.keys(state.data.daily).forEach(function(k) {
        if (k.indexOf(prefix) === 0) delete state.data.daily[k];
      });
      markDirty(); closeModal(); renderGantt();
    }

    // ===== 初期化 =====
    function init() {
      var parsed = parseHash();
      state.month = parsed.month;

      if (parsed.user) {
        state.user = parsed.user;
        showGanttMode();
        loadData(state.month);
      } else {
        showPersonSelectMode();
        renderPersonSelect();
      }

      window.addEventListener("beforeunload", function(e) {
        if (state.dirty) { e.preventDefault(); e.returnValue = ""; }
      });

      window.addEventListener("hashchange", function() {
        var p = parseHash();
        if (!p.user) {
          if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) {
            setHash(state.user, state.month); return;
          }
          state.user = null; state.dirty = false;
          showPersonSelectMode(); renderPersonSelect();
          return;
        }
        if (p.user !== state.user || p.month !== state.month) {
          if (state.dirty && !confirm("未保存の変更があります。破棄しますか？")) {
            setHash(state.user, state.month); return;
          }
          state.user = p.user;
          state.month = p.month;
          state.dirty = false;
          showGanttMode(); loadData(state.month);
        }
      });
    }

    init();
  </script>
</body>
</html>
