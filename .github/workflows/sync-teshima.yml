name: Sync 手島 Excel → JSON

on:
  schedule:
    - cron: "*/15 21-23,0-11 * * 0-5"  # JST 6:00-20:00 月〜土 (UTC: 日夜〜金昼)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Sync 手島 from DirectCloud
        run: python sync_teshima.py
        env:
          DIRECTCLOUD_SERVICE: ${{ secrets.DIRECTCLOUD_SERVICE }}
          DIRECTCLOUD_SERVICE_KEY: ${{ secrets.DIRECTCLOUD_SERVICE_KEY }}
          DIRECTCLOUD_CODE: ${{ secrets.DIRECTCLOUD_CODE }}
          DIRECTCLOUD_ID: ${{ secrets.DIRECTCLOUD_ID }}
          DIRECTCLOUD_PASSWORD: ${{ secrets.DIRECTCLOUD_PASSWORD }}
          DIRECTCLOUD_NODE: ${{ secrets.DIRECTCLOUD_NODE }}

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _*_手島.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-sync 手島 Excel data from DirectCloud"
            git push
          fi
